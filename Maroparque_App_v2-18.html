<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#F0F4F8;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* LOGIN */
#login{position:fixed;inset:0;background:#1A3A5C;display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#fff;border-radius:16px;padding:40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:20px;font-weight:700;color:#1A3A5C;margin-bottom:4px}
.login-sub{font-size:13px;color:#789;margin-bottom:24px}
.login-input{width:100%;padding:11px 14px;border:1.5px solid #C8D8E8;border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:12px;text-align:center;letter-spacing:3px}
.login-input:focus{outline:none;border-color:#1A3A5C}
.login-btn{width:100%;padding:12px;background:#1A3A5C;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.login-btn:hover{background:#2E6DA4}
.login-err{color:#B71C1C;font-size:12px;margin-top:8px;min-height:18px}

/* TOPBAR */
.topbar{background:#1A3A5C;padding:0 16px;display:flex;align-items:center;gap:12px;height:50px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.topbar-logo{font-size:20px}
.topbar-brand{display:flex;flex-direction:column}
.topbar-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:.5px}
.topbar-sub{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:1px}
.topbar-stat{font-size:11px;color:rgba(255,255,255,.7);margin-left:auto}
.btn-add-animal{background:#2E6DA4;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-add-animal:hover{background:#4A90D9}
.btn-import{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:7px;padding:7px 12px;font-size:11px;cursor:pointer;font-family:inherit}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden;background:#E8EEF5;min-height:0}

/* SIDEBAR */
.sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border-right:1px solid #D0E4F5;overflow:hidden}
.sidebar-filters{padding:10px 12px;border-bottom:1px solid #E0EEF8;background:#F8FBFF;flex-shrink:0;border-top:1px solid #E0EEF8}
.search-input{width:100%;padding:7px 10px;border:1px solid #C8D8E8;border-radius:7px;font-size:12px;margin-bottom:7px;font-family:inherit;color:#1a2a3a}
.filter-row{display:flex;gap:5px}
.filter-select{flex:1;padding:5px 6px;border:1px solid #C8D8E8;border-radius:6px;font-size:11px;font-family:inherit;background:#fff;color:#1a2a3a}
.result-count{font-size:10px;color:#999;margin-top:5px}
.animal-list{flex:1;overflow-y:auto}
.animal-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid #EEF4FF;transition:background .12s}
.animal-item:hover{background:#F0F7FF}
.animal-item.selected:hover{background:#D6E8FF}
.animal-item.selected{background:#D6E8FF;border-left-color:#1A3A5C;border-left-width:4px}
.ai-icon{font-size:20px;flex-shrink:0}
.ai-info{flex:1;min-width:0}
.ai-nom{font-size:12px;font-weight:600;color:#1A3A5C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-sci{font-size:10px;color:#789;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-id{font-size:9px;color:#aaa;margin-top:1px}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap;flex-shrink:0}

/* DETAIL */
.detail{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#F0F4F8;min-height:0}
.detail-header{background:linear-gradient(135deg,#1A3A5C,#2E6DA4);padding:14px 18px;flex-shrink:0;margin:8px 12px 0 12px;border-radius:10px 10px 0 0}
.detail-nom{font-size:17px;font-weight:700;color:#fff;line-height:1.2}
.detail-alias{font-size:13px;color:rgba(255,255,255,.85);margin-top:1px}
.detail-sci{font-size:11px;color:rgba(255,255,255,.7);font-style:italic;margin-top:2px}
.detail-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.detail-tabs{display:flex;border-bottom:2px solid #E0EEF8;background:#fff;flex-shrink:0;margin:0 12px;border-left:1px solid #e0e8f0;border-right:1px solid #e0e8f0}
.tab{padding:10px 16px;font-size:12px;font-weight:600;cursor:pointer;color:#789;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.active{color:#1A3A5C;border-bottom-color:#1A3A5C}
.tab:hover{color:#1A3A5C}
.tab-content{flex:1;overflow-y:auto;padding:20px 24px 60px 20px;background:#fff;margin:0 12px 8px 12px;border-radius:0 0 10px 10px;border:1px solid #e0e8f0;border-top:none}

/* FICHA */
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ficha-field{display:flex;flex-direction:column;gap:3px}
.ficha-label{font-size:10px;font-weight:600;color:#789;text-transform:uppercase;letter-spacing:.4px}
.ficha-val{font-size:13px;color:#1a2a3a;font-weight:500}
.ficha-val.empty{color:#bbb;font-style:italic;font-weight:400}
.ficha-section{margin-bottom:18px}
.ficha-section-title{font-size:11px;font-weight:700;color:#1A3A5C;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #E0EEF8}
.ficha-obs{background:#F8FBFF;border:1px solid #E0EEF8;border-radius:7px;padding:10px 12px;font-size:13px;color:#1a2a3a;line-height:1.6;white-space:pre-wrap;min-height:40px}
.ficha-obs.empty{color:#bbb;font-style:italic}
.foto-placeholder{width:100%;height:140px;background:#F0F4F8;border:1.5px dashed #C8D8E8;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:#aaa;font-size:12px}
.foto-img{width:100%;height:140px;object-fit:cover;border-radius:8px;border:1px solid #E0EEF8}

/* HISTORIAL */
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hist-title{font-size:13px;font-weight:700;color:#1A3A5C}
.hist-count{font-size:11px;color:#789;font-weight:400;margin-left:6px}
.btn-nueva{background:#1A3A5C;color:#fff;border:none;border-radius:7px;padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-nueva:hover{background:#2E6DA4}
.consulta-card{border:1px solid #D0E4F5;border-radius:9px;margin-bottom:10px;overflow:hidden;background:#fff}
.consulta-hdr{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#F0F7FF;cursor:pointer;user-select:none}
.consulta-body{padding:14px}
.sec-title{font-size:10px;font-weight:700;color:#1A3A5C;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.sec-content{font-size:12px;color:#1a2a3a;line-height:1.6;background:#F8FBFF;padding:9px 11px;border-radius:6px;border:1px solid #E0EEF8;white-space:pre-wrap;margin-bottom:12px}
.sec-content.lab{background:#EAF5FF;border-color:#B3D9F5}
.sec-content.radio{background:#EAF5EA;border-color:#B3D9B3}
.sec-content.necro{background:#F3E5F5;border-color:#CE93D8}
.revision-chip{display:inline-block;background:#FFF8E1;border:1px solid #FFD54F;border-radius:6px;padding:3px 10px;font-size:11px;color:#856404;margin-bottom:12px}
.vitales-row{display:flex;gap:12px;margin-bottom:12px}
.vital-box{flex:1;background:#F0F7FF;border:1px solid #C8D8E8;border-radius:7px;padding:8px 10px;text-align:center}
.vital-label{font-size:10px;color:#789;font-weight:600;text-transform:uppercase}
.vital-val{font-size:16px;font-weight:700;color:#1A3A5C;margin-top:2px}
.empty-state{text-align:center;color:#999;padding:40px;font-size:13px}

/* FORMULARIOS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:#fff;border-radius:14px;width:100%;max-width:680px;overflow:hidden;margin:auto}
.modal-header{background:#1A3A5C;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700;color:#fff}
.modal-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;line-height:1}
.modal-body{padding:20px;max-height:75vh;overflow-y:auto}
.modal-footer{padding:14px 20px;border-top:1px solid #E0EEF8;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.form-section{margin-bottom:18px}
.form-section-title{font-size:11px;font-weight:700;color:#1A3A5C;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid #E0EEF8}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-field{display:flex;flex-direction:column;gap:3px}
.form-field.full{grid-column:1/-1}
.flabel{font-size:10px;font-weight:600;color:#1A3A5C;text-transform:uppercase;letter-spacing:.4px}
.finput,.fselect,.ftextarea{width:100%;padding:7px 9px;border:1px solid #C8D8E8;border-radius:6px;font-size:12px;font-family:inherit;color:#1a2a3a;background:#F8FBFF}
.finput:focus,.fselect:focus,.ftextarea:focus{outline:none;border-color:#2E6DA4;background:#fff}
.ftextarea{resize:vertical}
.necro-box{background:#EDE7F6;border:1px solid #CE93D8;border-radius:8px;padding:10px 12px;margin-top:8px}
.checkbox-label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;color:#4A148C}
.btn-primary{padding:9px 20px;border-radius:7px;border:none;background:#1A3A5C;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary:hover{background:#2E6DA4}
.btn-secondary{padding:9px 16px;border-radius:7px;border:1px solid #C8D8E8;background:#fff;font-size:13px;cursor:pointer;color:#456;font-family:inherit}

// ── SUBIR FOTO ─────────────────────────────────────────────────────────────
async function subirFoto(animalId, file){
  const ext = file.name.split('.').pop();
  const path = 'animal_'+animalId+'/foto.'+ext;
  const {data, error} = await db.storage.from('fotos').upload(path, file, {upsert:true});
  if(error) return null;
  const {data:urlData} = db.storage.from('fotos').getPublicUrl(path);
  return urlData.publicUrl;
}

  const btn = document.getElementById('fotoBtnLabel');
  if(btn) btn.textContent = 'Subiendo...';
  const url = await subirFoto(selAnimal.id, file);
  if(!url){
    alert('Error al subir la foto. Comprueba el bucket en Supabase.');
    if(btn) btn.textContent = '📷 Cambiar foto';
    return;

// ── LOAD ANIMALS ───────────────────────────────────────────────────────────
async function loadAnimals(){
  document.getElementById('animalList').innerHTML='<div class="loading"><span class="spinner"></span>Cargando censo…</div>';
  const {data,error}=await db.from('animales').select('*').order('nombre_comun');
  if(error){document.getElementById('animalList').innerHTML='<div class="loading">Error al cargar datos</div>';return;}
  allAnimals=data||[];
  // Show import button if no animals yet
  if(allAnimals.length===0) document.getElementById('importBtn').style.display='block';
  applyFilters();
  updateStatBar();
  populateAnioFilter();
}

async function populateAnioFilter(){
  // Get distinct years from consultas
  const {data} = await db.from('consultas').select('fecha').order('fecha',{ascending:false});
  if(!data) return;
  const years = [...new Set((data||[]).map(c=>c.fecha?c.fecha.slice(0,4):'').filter(Boolean))].sort((a,b)=>b-a);
  const sel = document.getElementById('anioFilter');
  if(!sel) return;
  years.forEach(y=>{
    const opt=document.createElement('option');
    opt.value=y; opt.textContent=y;
    sel.appendChild(opt);
  });
}

function updateStatBar(){
  const activos=allAnimals.filter(a=>a.estado==='Activo').length;
  document.getElementById('statBar').textContent=`${allAnimals.length} animales · ${activos} activos`;
  buildSpeciesIndex();
}

// Species autocomplete index
let speciesIndex=[];
function buildSpeciesIndex(){
  const seen=new Set();
  speciesIndex=[];
  allAnimals.forEach(a=>{
    if(a.nombre_cientifico&&!seen.has(a.nombre_cientifico)){
      seen.add(a.nombre_cientifico);
      speciesIndex.push({
        sci:a.nombre_cientifico,
        com:a.nombre_comun||'',
        clase:a.clase||'',
        cites:a.cites||'',
        iucn:a.iucn||'',
        invasora:a.invasora||'',
        peligrosa:a.peligrosa||'',
        protegida:a.protegida||'',
      });
    }
  });
  speciesIndex.sort((a,b)=>a.sci.localeCompare(b.sci));
}

function showSpeciesSuggestions(val){
  const wrap=document.getElementById('sciWrap');
  let list=document.getElementById('sciList');
  if(!list){list=document.createElement('div');list.id='sciList';list.className='autocomplete-list';wrap.appendChild(list);}
  if(!val||val.length<2){list.style.display='none';return;}
  const q=val.toLowerCase();
  const matches=speciesIndex.filter(s=>s.sci.toLowerCase().includes(q)||s.com.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){list.style.display='none';return;}
  list.innerHTML=matches.map((s,i)=>`<div class="autocomplete-item" onclick="selectSpecies(${i},'${s.sci.replace(/'/g,"\'")}')">
    <div class="sci">${s.sci}</div>
    <div class="com">${s.com}</div>
  </div>`).join('');
  list.style.display='block';
}

function selectSpecies(idx, sci){
  // Find in speciesIndex
  const sp=speciesIndex.find(s=>s.sci===sci);
  if(!sp)return;
  // Fill form fields
  const set=(id,v)=>{const el=document.getElementById('f_'+id);if(el&&v)el.value=v;};
  set('nombre_cientifico',sp.sci);
  set('nombre_comun',sp.com);
  set('clase',sp.clase);
  // Select dropdowns
  const setSelect=(id,v)=>{
    const el=document.getElementById('f_'+id);
    if(!el||!v)return;
    Array.from(el.options).forEach(o=>{if(o.value===v||o.text===v)el.value=o.value;});
  };
  setSelect('clase',sp.clase);
  setSelect('cites',sp.cites);
  setSelect('iucn',sp.iucn);
  setSelect('invasora',sp.invasora);
  setSelect('peligrosa',sp.peligrosa);
  setSelect('protegida',sp.protegida);
  // Hide dropdown
  const list=document.getElementById('sciList');
  if(list)list.style.display='none';
}

function applyFilters(){
  let f=[...allAnimals];
  if(searchVal){
    const q=searchVal.toLowerCase();
    f=f.filter(a=>
      (a.nombre_comun||'').toLowerCase().includes(q)||
      (a.nombre_cientifico||'').toLowerCase().includes(q)||
      (a.nombre_alias||'').toLowerCase().includes(q)||
      (a.chip||'').toLowerCase().includes(q)||
      (a.anilla||'').toLowerCase().includes(q)||
      (a.otro_identificador||'').toLowerCase().includes(q)||
      String(a.id).includes(q)
    );
  }
  if(fClase) f=f.filter(a=>a.clase===fClase);
  if(fEstado) f=f.filter(a=>a.estado===fEstado);
  if(fPatologia) f=f.filter(a=>animalesConPatologia.has(a.id));
  if(fAnio) f=f.filter(a=>animalesConAnio.has(a.id));
  filtered=f;
  renderList();
}

function doSearch(v){searchVal=v;applyFilters();}
function doFilterAnio(v){
  fAnio=v;
  if(v){
    db.from('consultas').select('animal_id').like('fecha',v+'%').then(({data})=>{
      animalesConAnio=new Set((data||[]).map(c=>c.animal_id));
      applyFilters();
    });
  } else {
    animalesConAnio=new Set();
    applyFilters();
  }
}
function doFilterPatologia(v){
  fPatologia=v;
  if(v){
    // Load animals that have consultations with this patologia
    db.from('consultas').select('animal_id').eq('patologia',v).then(({data})=>{
      animalesConPatologia=new Set((data||[]).map(c=>c.animal_id));
      applyFilters();
    });
  } else {
    animalesConPatologia=new Set();
    applyFilters();
  }
}
function doFilterClase(v){fClase=v;applyFilters();}
function doFilterEstado(v){fEstado=v;applyFilters();}

function renderList(){
  document.getElementById('resultCount').textContent=`${filtered.length} resultado${filtered.length!==1?'s':''}`;
  if(filtered.length===0){
    document.getElementById('animalList').innerHTML='<div class="loading">Sin resultados</div>';
    return;
  }
  const html=filtered.map(a=>{
    const isSel=selAnimal&&selAnimal.id===a.id;
    const idShow=a.chip?a.chip.slice(-6):a.anilla?a.anilla.slice(-8):a.otro_identificador?a.otro_identificador.slice(-8):`#${a.id}`;
    const estColor=a.estado==='Baja'?'#7B241C':'#1B5E20';
    const estBg=a.estado==='Baja'?'#FADBD8':'#E8F5E9';
    const estLabel=a.estado==='Baja'?'Baja':'Activo';
    const displayName=a.nombre_alias?`${a.nombre_comun} "${a.nombre_alias}"`:a.nombre_comun||a.nombre_cientifico;
    return`<div class="animal-item${isSel?' selected':''}" onclick="selectAnimal(${a.id})">
      <span class="ai-icon">${CLASE_ICON[a.clase]||'❓'}</span>
      <div class="ai-info">
        <div class="ai-nom">${displayName}</div>
        <div class="ai-sci">${a.nombre_cientifico||''}</div>
        <div class="ai-id">${idShow}</div>
      </div>
      <span class="badge" style="background:${estBg};color:${estColor}">${estLabel}</span>
    </div>`;
  }).join('');
  document.getElementById('animalList').innerHTML=html;
}

// ── SELECT ANIMAL ──────────────────────────────────────────────────────────
async function selectAnimal(id){
  // Remove selected from previous
  document.querySelectorAll('.animal-item.selected').forEach(el=>el.classList.remove('selected'));
  // Set new selection
  selAnimal=allAnimals.find(a=>a.id===id)||null;
  if(!selAnimal)return;
  // Mark new selected item
  var newItem=document.querySelector('.animal-item[onclick="selectAnimal('+id+')"]');
  if(newItem) newItem.classList.add('selected');
  selTab='ficha';
  expandedConsultas=new Set([0]);
  renderDetail();
  loadConsultas(id);
}

  consultas=data||[];
  if(selAnimal&&selAnimal.id===animalId) renderConsultasList();

  const a=selAnimal;
  const displayName=a.nombre_alias?`${a.nombre_comun} <span style="font-weight:400">"${a.nombre_alias}"</span>`:(a.nombre_comun||a.nombre_cientifico||'Sin nombre');

    a.clase?badge(`${CLASE_ICON[a.clase]||''} ${a.clase}`,'#fff','rgba(255,255,255,.18)'):'',

    a.cites&&a.cites!=='No CITES'?badge(a.cites,'#fff','rgba(255,255,255,.18)'):'',
    a.protegida==='Sí'?badge('🛡 Protegida','#fff','rgba(255,255,255,.18)'):'',
    a.peligrosa==='Sí'?badge('⚠️ Peligrosa','#fff','rgba(200,30,20,.5)'):'',
    a.invasora==='Sí'?badge('🔴 Invasora','#fff','rgba(180,20,20,.4)'):'',
  ].filter(Boolean).join('');
  document.getElementById('detailPane').className='detail';
  document.getElementById('detailPane').innerHTML=`
    <div class="detail-header">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div style="width:48px;height:48px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">${CLASE_ICON[a.clase]||'❓'}</div>
        <div style="flex:1;min-width:0">
          <div class="detail-nom">${displayName}</div>
          <div class="detail-sci">${a.nombre_cientifico||''}</div>
          <div class="detail-badges">${badges}</div>

function switchTab(tab){
  selTab=tab;
  if(!selAnimal)return;
  renderDetail();
  if(tab==='historial'){

    setTimeout(()=>renderConsultasList(), 10);

}

let consultaFilter='';
let consultaOrder='desc'; // desc = más recientes primero

function toggleConsultaOrder(){
  consultaOrder = consultaOrder==='desc'?'asc':'desc';
  const btn=document.getElementById('btnOrden');
  if(btn) btn.textContent=consultaOrder==='desc'?'↓ Más recientes primero':'↑ Más antiguas primero';
  renderConsultasList();
}

function filtrarConsultas(v){
  consultaFilter=(v||'').toLowerCase();
  renderConsultasList();
}

function renderConsultasHTML(){
  let filtered=[...consultas].sort((a,b)=>consultaOrder==='desc'?b.fecha.localeCompare(a.fecha):a.fecha.localeCompare(b.fecha));
  if(consultaFilter){
    filtered=consultas.filter(c=>{
      const txt=[c.motivo_consulta,c.anamnesis,c.exploracion_fisica,c.diagnostico,
        c.tratamiento,c.evolucion,c.pruebas_laboratorio,c.pruebas_radiologicas,
        c.observaciones_consulta,c.veterinario,c.patologia,c.fecha]
        .filter(Boolean).join(' ').toLowerCase();
      return txt.includes(consultaFilter);
    });
  }
  if(filtered.length===0) return`<div class="empty-state"><div style="font-size:34px;margin-bottom:8px">📋</div><div>${consultaFilter?'Sin resultados para "'+consultaFilter+'"':'Sin actuaciones registradas'}</div><div style="font-size:11px;margin-top:4px">${consultaFilter?'':'Pulsa "+ Nueva actuación" para registrar la primera consulta'}</div></div>`;
  return filtered.map((c)=>{
    const origIdx=consultas.indexOf(c);
    const exp=expandedConsultas.has(origIdx);
    const secs=[
      {k:'motivo_consulta',l:'1. Motivo de consulta',ic:'📋'},
      {k:'anamnesis',l:'2. Anamnesis',ic:'📝'},
      {k:'exploracion_fisica',l:'3. Exploración física',ic:'🔬'},
      {k:'diagnostico',l:'4. Diagnóstico',ic:'🏥'},
      {k:'tratamiento',l:'5. Tratamiento',ic:'💊'},
      {k:'evolucion',l:'6. Evolución',ic:'📈'},
    ];
    const preview=!exp&&c.motivo_consulta?` — <em style="color:#789;font-size:10px">"${(c.motivo_consulta||'').slice(0,60)}${(c.motivo_consulta||'').length>60?'…':''}"</em>`:'';
    return`<div class="consulta-card">
      <div class="consulta-hdr" onclick="toggleConsulta(${origIdx})">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:700;color:#1A3A5C">${fmtDate(c.fecha)}</span>
            ${c.patologia?`<span class="badge" style="background:#EDE7F6;color:#4A148C">🏥 ${esc(c.patologia)}</span>`:''}
            ${c.estado_clinico?`<span class="badge" style="background:${ESTADO_BG[c.estado_clinico]||'#eee'};color:${ESTADO_COLOR[c.estado_clinico]||'#333'}">${c.estado_clinico}</span>`:''}
            ${c.necropsia?badge('Necropsia','#4A148C','#EDE7F6'):''}
            ${c.proxima_revision?`<span class="badge" style="background:#FFF8E1;color:#856404">📅 Rev: ${fmtDate(c.proxima_revision)}</span>`:''}
          </div>
          ${c.veterinario?`<div style="font-size:11px;color:#789;margin-top:2px">${esc(c.veterinario)}</div>`:''}
          ${preview}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${puedeEditar(c)?`<button onclick="editarConsulta(event,${origIdx})" style="background:none;border:1px solid #C8D8E8;cursor:pointer;color:#1A3A5C;font-size:11px;padding:2px 7px;border-radius:5px" title="Editar actuación">✏️</button>`:''}
          <button onclick="duplicarConsulta(event,${origIdx})" style="background:none;border:1px solid #C8D8E8;cursor:pointer;color:#456;font-size:11px;padding:2px 7px;border-radius:5px" title="Duplicar">⧉</button>
          <button onclick="deleteConsulta(event,${c.id})" style="background:none;border:none;cursor:pointer;color:#B71C1C;font-size:12px;padding:2px 5px">✕</button>
          <span style="font-size:12px;color:#1A3A5C">${exp?'▲':'▼'}</span>
        </div>
      </div>
      ${exp?`<div class="consulta-body">
        ${(c.peso||c.temperatura)?`<div class="vitales-row">${c.peso?`<div class="vital-box"><div class="vital-label">Peso</div><div class="vital-val">${esc(c.peso)}</div></div>`:''} ${c.temperatura?`<div class="vital-box"><div class="vital-label">Temperatura</div><div class="vital-val">${esc(c.temperatura)}</div></div>`:''}</div>`:''}
        ${secs.map(s=>c[s.k]?`<div class="sec-title">${s.ic} ${s.l}</div><div class="sec-content">${esc(c[s.k])}</div>`:'').join('')}
        ${c.pruebas_laboratorio?`<div class="sec-title">🧪 Pruebas de laboratorio</div><div class="sec-content lab">${esc(c.pruebas_laboratorio)}</div>`:''}
        ${c.pruebas_radiologicas?`<div class="sec-title">📡 Pruebas radiológicas</div><div class="sec-content radio">${esc(c.pruebas_radiologicas)}</div>`:''}
        ${c.observaciones_consulta?`<div class="sec-title">📝 Observaciones</div><div class="sec-content">${esc(c.observaciones_consulta)}</div>`:''}
        ${c.necropsia?`<div class="sec-title">🔍 Necropsia</div><div class="sec-content necro">${esc(c.descripcion_necropsia||'Realizada (sin descripción)')}</div>`:''}
        ${c.foto_consulta_url?`<div class="sec-title">📸 Foto</div><div style="margin-bottom:12px"><img src="${c.foto_consulta_url}" style="max-width:100%;max-height:300px;border-radius:8px;border:1px solid #E0EEF8" onerror="this.style.display='none'"></div>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}

function renderConsultasList(){
  const el=document.getElementById('consultasList');
  if(el) el.innerHTML=renderConsultasHTML();
  const ct=document.querySelector('.hist-count');
  if(ct) ct.textContent=consultas.length>0?'('+consultas.length+' actuación'+(consultas.length!==1?'es':'')+')'  :'';
}

function toggleConsulta(i){if(expandedConsultas.has(i))expandedConsultas.delete(i);else expandedConsultas.add(i);renderConsultasList();}

async function duplicarConsulta(e,idx){
  e.stopPropagation();
  if(!selAnimal||!consultas[idx])return;
  const orig=consultas[idx];
  const copia={
    animal_id:selAnimal.id,
    fecha:new Date().toISOString().slice(0,10),
    veterinario:orig.veterinario,
    estado_clinico:orig.estado_clinico,
    peso:orig.peso,
    temperatura:orig.temperatura,
    patologia:orig.patologia,
    motivo_consulta:orig.motivo_consulta,
    anamnesis:orig.anamnesis,
    exploracion_fisica:orig.exploracion_fisica,
    diagnostico:orig.diagnostico,
    tratamiento:orig.tratamiento,
    evolucion:'',
    pruebas_laboratorio:orig.pruebas_laboratorio,
    pruebas_radiologicas:orig.pruebas_radiologicas,
    observaciones_consulta:orig.observaciones_consulta,
    necropsia:false,
    descripcion_necropsia:'',
    foto_consulta_url:'',
  };
  const{data,error}=await db.from('consultas').insert([copia]).select();
  if(error){alert('Error al duplicar: '+error.message);return;}
  consultas=[data[0],...consultas];
  expandedConsultas=new Set([0]);
  renderConsultasList();
}

async function deleteConsulta(e,id){
  e.stopPropagation();
  if(!confirm('¿Eliminar esta consulta del historial?'))return;
  await db.from('consultas').delete().eq('id',id);
  consultas=consultas.filter(c=>c.id!==id);
  expandedConsultas=new Set([0]);
  renderConsultasList();
}

    diagnostico:g('cDiagnostico').value||'',
    tratamiento:g('cTratamiento').value||'',
    evolucion:g('cEvolucion').value||'',
    pruebas_laboratorio:g('cLab').value||'',
    pruebas_radiologicas:g('cRadio').value||'',
    necropsia:g('cNecropsia').checked,
    descripcion_necropsia:g('cNecroDesc').value||'',
    patologia:(()=>{
      var sel=document.getElementById('cPatologia')?.value||'';

      return sel==='__nueva__'?otra:sel;
    })(),
    observaciones_consulta:g('cObsConsulta').value||'',
    foto_consulta_url:'',
  };
  // Upload consultation photo if selected
  const prevEl=document.getElementById('fotoConsultaPreview');
  if(prevEl&&prevEl._file){
    const f=prevEl._file;
    const ext=f.name.split('.').pop();
    const path='consulta_'+selAnimal.id+'_'+Date.now()+'.'+ext;
    const {data:upData,error:upErr}=await db.storage.from('fotos').upload(path,f,{upsert:true});
    if(!upErr){
      const {data:urlData}=db.storage.from('fotos').getPublicUrl(path);
      row.foto_consulta_url=urlData.publicUrl;
    }
  }
  const{data,error}=await db.from('consultas').insert([row]).select();
  if(error){g('consultaErr').innerHTML=`<div class="error-msg">Error al guardar: ${error.message}</div>`;return;}
  consultas=[data[0],...consultas];
  expandedConsultas=new Set([0]);

}

async function saveAnimal(id){
  const g=fld=>document.getElementById('f_'+fld)?.value||'';
  const gSel=fld=>document.getElementById('f_'+fld)?.value||'';
  if(!g('nombre_comun').trim()){document.getElementById('animalErr').innerHTML='<div class="error-msg">El nombre común es obligatorio</div>';return;}
  if(!g('fecha_ingreso').trim()){document.getElementById('animalErr').innerHTML='<div class="error-msg">La fecha de ingreso es obligatoria</div>';return;}
  const row={
    nombre_comun:g('nombre_comun'),nombre_alias:g('nombre_alias'),
    nombre_cientifico:g('nombre_cientifico'),clase:gSel('clase'),
    sexo:gSel('sexo'),fecha_nacimiento:g('fecha_nacimiento'),
    edad_estimada:g('edad_estimada'),chip:g('chip'),anilla:g('anilla'),
    otro_id_tipo:g('otro_id_tipo'),otro_identificador:g('otro_identificador'),
    expediente:g('expediente'),municipio:gSel('municipio'),
    origen:g('origen'),fecha_ingreso:g('fecha_ingreso'),
    causa_ingreso:gSel('causa_ingreso'),destino_previsto:g('destino_previsto'),
    cites:gSel('cites'),iucn:gSel('iucn'),invasora:gSel('invasora'),
    peligrosa:gSel('peligrosa'),protegida:gSel('protegida'),
    foto_url:g('foto_url'),alergias:g('alergias'),
    medicacion_cronica:g('medicacion_cronica'),observaciones:g('observaciones'),
  };
  let result;
  if(id){
    result=await db.from('animales').update(row).eq('id',id).select();
  } else {
    row.estado='Activo';
    result=await db.from('animales').insert([row]).select();
  }
  if(result.error){document.getElementById('animalErr').innerHTML=`<div class="error-msg">Error: ${result.error.message}</div>`;return;}
  const saved=result.data[0];
  if(id){
    allAnimals=allAnimals.map(a=>a.id===id?saved:a);
    selAnimal=saved;
  } else {
    allAnimals.unshift(saved);
    selAnimal=saved;
  }
  applyFilters();
  updateStatBar();
  closeModal();
  renderDetail();
}

async function doImport(){
  const progEl=document.getElementById('importProgress');
  if(!progEl){alert('Error interno: elemento no encontrado');return;}
  
  progEl.innerHTML='<div class="import-progress"><span class="spinner"></span>Probando conexión con Supabase…</div>';
  
  // Step 1: test connection with single animal
  const testAnimal = {
    nombre_comun:'Test conexión',
    nombre_cientifico:'Test',
    clase:'Ave',
    estado:'Activo',
    fecha_ingreso:'2026'
  };
  
  try {
    const testRes = await db.from('animales').insert([testAnimal]).select();
    if(testRes.error){
      progEl.innerHTML='<div class="error-msg">❌ Error de conexión:<br><b>'+testRes.error.message+'</b><br>Código: '+testRes.error.code+'<br><br>Posible solución: comprueba los permisos en Supabase (SQL Editor → ejecuta el grant que te indiqué)</div>';
      return;
    }
    // Delete test animal
    if(testRes.data&&testRes.data[0]) await db.from('animales').delete().eq('id',testRes.data[0].id);
  } catch(e){
    progEl.innerHTML='<div class="error-msg">❌ Excepción de red: '+e.message+'</div>';
    return;
  }
  
  progEl.innerHTML='<div class="import-progress"><span class="spinner"></span>Conexión OK. Importando 558 animales…</div>';
  
  if(!MAROPARQUE_CENSUS||MAROPARQUE_CENSUS.length===0){
    progEl.innerHTML='<div class="error-msg">Error: datos del censo no encontrados en el archivo</div>';
    return;
  }
  
  const CENSUS_DATA = MAROPARQUE_CENSUS;
  const batches=[];
  for(let i=0;i<CENSUS_DATA.length;i+=50) batches.push(CENSUS_DATA.slice(i,i+50));
  let ok=0;
  
  for(let i=0;i<batches.length;i++){
    progEl.innerHTML='<div class="import-progress"><span class="spinner"></span>Lote '+(i+1)+' de '+batches.length+' — '+ok+' animales cargados…</div>';
    try {
      const res = await db.from('animales').insert(batches[i]);
      if(res.error){
        progEl.innerHTML='<div class="error-msg">❌ Error en lote '+(i+1)+':<br><b>'+res.error.message+'</b><br>Código: '+res.error.code+'<br>Hint: '+(res.error.hint||'ninguno')+'</div>';
        return;
      }
      ok+=batches[i].length;
    } catch(e) {
      progEl.innerHTML='<div class="error-msg">❌ Excepción en lote '+(i+1)+': '+e.message+'</div>';
      return;
    }
  }
  
  progEl.innerHTML='<div class="success-msg">✅ '+ok+' animales importados correctamente. Cargando lista…</div>';
  setTimeout(function(){
    closeModal();
    loadAnimals();
    var btn=document.getElementById('importBtn');
    if(btn)btn.style.display='none';
  },2000);
}

async function cargarEstadisticas(){
  const dia=document.getElementById('filtDia')?.value||'';
  const mes=document.getElementById('filtMes')?.value||'';
  const anio=document.getElementById('filtAnio')?.value||'';
  const resEl=document.getElementById('statsResult');
  if(!resEl)return;
  resEl.innerHTML='<div style="text-align:center;padding:20px"><span class="spinner"></span> Cargando...</div>';

  let query=db.from('consultas').select('*, animales(nombre_comun, nombre_cientifico, clase)');
  if(anio&&mes&&dia) query=query.like('fecha',anio+'-'+mes+'-'+dia.padStart(2,'0')+'%');
  else if(anio&&mes) query=query.like('fecha',anio+'-'+mes+'%');
  else if(anio) query=query.like('fecha',anio+'%');
  else if(mes&&!anio) query=query.like('fecha','%'+'-'+mes+'-%');

  const{data,error}=await query.order('fecha',{ascending:false});
  if(error||!data){resEl.innerHTML='<div class="error-msg">Error al cargar datos</div>';return;}
  if(data.length===0){resEl.innerHTML='<div style="text-align:center;color:#999;padding:30px;font-size:13px">No hay actuaciones en este periodo</div>';return;}

  // Build stats
  const byVet={}, byClase={}, byMes={};
  data.forEach(c=>{
    const vet=c.veterinario||'Sin especificar';
    byVet[vet]=(byVet[vet]||0)+1;
    const cl=c.animales?.clase||'Desconocida';
    byClase[cl]=(byClase[cl]||0)+1;
    const m=c.fecha?c.fecha.slice(0,7):'';
    if(m) byMes[m]=(byMes[m]||0)+1;
  });

  const barVet=Object.entries(byVet).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">

// ── EXPORTAR WORD ──────────────────────────────────────────────────────────
function escXml(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function wPar(text, opts){
  opts = opts||{};
  const bold = opts.bold ? '<w:b/>' : '';
  const italic = opts.italic ? '<w:i/>' : '';
  const size = opts.size ? '<w:sz w:val="'+(opts.size*2)+'"/><w:szCs w:val="'+(opts.size*2)+'"/>' : '';
  const color = opts.color ? '<w:color w:val="'+opts.color+'"/>' : '';
  const align = opts.align ? '<w:jc w:val="'+opts.align+'"/>' : '';
  const spaceBefore = opts.spaceBefore ? '<w:spacing w:before="'+opts.spaceBefore+'"/>' : '';
  const spaceAfter = opts.spaceAfter !== undefined ? opts.spaceAfter : 120;
  const border = opts.borderBottom ? '<w:pBdr><w:bottom w:val="single" w:sz="4" w:space="1" w:color="1A3A5C"/></w:pBdr>' : '';
  const lines = String(text||'').split('\n');
  return lines.map((line,i) => `<w:p>
    <w:pPr>${align}${spaceBefore}<w:spacing w:after="${spaceAfter}"/>${border}</w:pPr>
    <w:r><w:rPr>${bold}${italic}${size}${color}</w:rPr><w:t xml:space="preserve">${escXml(line)}</w:t></w:r>
  </w:p>`).join('');
}

function wField(label, value){
  if(!value || !String(value).trim()) return '';
  return `<w:p>
    <w:pPr><w:spacing w:after="80"/></w:pPr>
    <w:r><w:rPr><w:b/><w:sz w:val="20"/><w:szCs w:val="20"/><w:color w:val="1A3A5C"/></w:rPr><w:t xml:space="preserve">${escXml(label)}: </w:t></w:r>
    <w:r><w:rPr><w:sz w:val="20"/><w:szCs w:val="20"/></w:rPr><w:t xml:space="preserve">${escXml(value)}</w:t></w:r>
  </w:p>`;
}

function wSection(title){
  return `<w:p>
    <w:pPr><w:spacing w:before="240" w:after="80"/><w:pBdr><w:bottom w:val="single" w:sz="4" w:space="1" w:color="2E6DA4"/></w:pBdr></w:pPr>
    <w:r><w:rPr><w:b/><w:sz w:val="22"/><w:szCs w:val="22"/><w:color w:val="1A3A5C"/></w:rPr><w:t>${escXml(title)}</w:t></w:r>
  </w:p>`;
}

async function generarDocWord(soloUltima){
  if(!selAnimal){alert('Selecciona un animal primero');return;}
  const a = selAnimal;

  if(!consultas.length){
    const {data} = await db.from('consultas').select('*').eq('animal_id',a.id).order('fecha',{ascending:false});
    consultas = data||[];
  }
  const actList = soloUltima ? consultas.slice(0,1) : consultas;
  const nombre = a.nombre_alias ? a.nombre_comun+' "'+a.nombre_alias+'"' : (a.nombre_comun||a.nombre_cientifico||'Animal');

  const docXml = buildDocxXml(a, actList, soloUltima);

  // Build DOCX (ZIP) manually using a minimal structure
  const relsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  const wordRelsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`;

  const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:docDefaults><w:rPrDefault><w:rPr>
    <w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/>
    <w:sz w:val="20"/><w:szCs w:val="20"/>
  </w:rPr></w:rPrDefault></w:docDefaults>
</w:styles>`;

  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
</Types>`;

  // Use JSZip if available, otherwise fall back to a simple approach
  // We'll use a data URI approach with HTML as fallback
  try {
    // Try to create DOCX using Blob + download
    const files = {
      '[Content_Types].xml': contentTypes,
      '_rels/.rels': relsXml,
      'word/document.xml': docXml,
      'word/styles.xml': stylesXml,
      'word/_rels/document.xml.rels': wordRelsXml,
    };

    // Check if JSZip is available
    if(typeof JSZip !== 'undefined'){
      const zip = new JSZip();
      Object.entries(files).forEach(([path, content]) => zip.file(path, content));
      const blob = await zip.generateAsync({type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      const safeName = nombre.replace(/[^a-zA-Z0-9 ]/g,'_').slice(0,40);
      link.download = 'Maroparque_'+(soloUltima?'UltimaActuacion':'Historial')+'_'+safeName+'.docx';
      link.click();
      URL.revokeObjectURL(url);
    } else {
      // Fallback: download as HTML that looks like a Word document
      await generarHTML(a, actList, soloUltima, nombre);
    }
  } catch(e){
    await generarHTML(a, actList, soloUltima, nombre);
  }
}

async function urlToBase64(url){
  try {
    const resp = await fetch(url);
    const blob = await resp.blob();
    return await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result);
      r.onerror=rej;
      r.readAsDataURL(blob);
    });
  } catch(e){ return null; }
}

// ── GRÁFICA DE PESOS ────────────────────────────────────────────────────────
function renderGraficaPesos(){
  const pesosData = consultas
    .filter(c=>c.peso&&c.fecha)
    .map(c=>({fecha:c.fecha, peso:parseFloat(c.peso.replace(',','.'))}))
    .filter(c=>!isNaN(c.peso))
    .sort((a,b)=>a.fecha.localeCompare(b.fecha));
  if(pesosData.length<2) return '';
  const max=Math.max(...pesosData.map(p=>p.peso));
  const min=Math.min(...pesosData.map(p=>p.peso));
  const range=max-min||1;
  const W=500, H=120, pad=30;
  const pts=pesosData.map((p,i)=>{
    const x=pad+(i/(pesosData.length-1))*(W-pad*2);
    const y=H-pad-(p.peso-min)/range*(H-pad*2);
    return{x,y,p};
  });
  const path=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join('');
  const dots=pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="#1A3A5C">
    <title>${fmtDate(p.p.fecha)}: ${p.p.peso} kg</title></circle>`).join('');
  const labels=pts.filter((_,i)=>i===0||i===pts.length-1||pts.length<=6).map(p=>
    `<text x="${p.x.toFixed(1)}" y="${(H-8).toFixed(1)}" text-anchor="middle" font-size="9" fill="#789">${p.p.fecha.slice(0,7)}</text>`).join('');
  return`<div class="ficha-section">
    <div class="ficha-section-title">⚖️ Evolución del peso</div>
    <svg width="100%" viewBox="0 0 ${W} ${H}" style="background:#F8FBFF;border-radius:8px;border:1px solid #E0EEF8">
      <path d="${path}" fill="none" stroke="#2E6DA4" stroke-width="2"/>
      ${dots}${labels}
      <text x="${pad}" y="20" font-size="9" fill="#789">${max} kg</text>
      <text x="${pad}" y="${H-pad+12}" font-size="9" fill="#789">${min} kg</text>
    </svg>
    <div style="font-size:11px;color:#789;margin-top:4px">${pesosData.length} registros · Último: ${pesosData[pesosData.length-1].peso} kg</div>
  </div>`;
}

async function generarInformeAnual(){
  const anio=document.getElementById('informeAnio')?.value;
  if(!anio)return;
  const el=document.getElementById('informeResult');
  if(!el)return;
  el.innerHTML='<div class="loading"><span class="spinner"></span>Generando informe…</div>';
  
  const[consRes,animRes]=await Promise.all([
    db.from('consultas').select('*,animales(nombre_comun,clase,estado)').like('fecha',anio+'%'),
    db.from('animales').select('*').like('fecha_ingreso',anio+'%')
  ]);
  
  const cons=consRes.data||[];
  const nuevos=animRes.data||[];
  const bajas=allAnimals.filter(a=>a.estado==='Baja'&&a.fecha_baja&&a.fecha_baja.startsWith(anio));
  
  const byVet={}, byClase={}, byPat={}, byMes={};
  cons.forEach(c=>{
    const v=c.veterinario||'Sin especificar';
    byVet[v]=(byVet[v]||0)+1;
    const cl=c.animales?.clase||'Desconocida';
    byClase[cl]=(byClase[cl]||0)+1;
    if(c.patologia){const p=c.patologia;byPat[p]=(byPat[p]||0)+1;}
    const m=c.fecha?c.fecha.slice(0,7):'';
    if(m)byMes[m]=(byMes[m]||0)+1;
  });
  
  informeData={anio,cons,nuevos,bajas,byVet,byClase,byPat,byMes};
  
  const bar=(obj,color)=>Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([k,v])=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <div style="width:160px;font-size:11px;color:#456;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${k}</div>
      <div style="flex:1;background:#E8F0FA;border-radius:3px">
        <div style="background:${color};height:16px;border-radius:3px;width:${Math.round(v/Math.max(...Object.values(obj))*100)}%"></div>
      </div>
      <div style="font-size:11px;font-weight:700;color:#1A3A5C;width:25px;text-align:right">${v}</div>
    </div>`).join('');

  const mesesNombres=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const mesBar=Object.entries(byMes).sort((a,b)=>a[0].localeCompare(b[0])).map(([m,v])=>{
    const mn=mesesNombres[parseInt(m.slice(5))-1]||m;
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1">
      <div style="font-size:10px;font-weight:700;color:#1A3A5C">${v}</div>
      <div style="width:100%;background:#2E6DA4;border-radius:3px 3px 0 0;height:${Math.round(v/Math.max(...Object.values(byMes))*60)}px"></div>
      <div style="font-size:9px;color:#789">${mn}</div>
    </div>`;}).join('');
  
  el.innerHTML=`
    <div style="background:#F0F7FF;border-radius:8px;padding:14px;margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap;justify-content:center">
      <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#1A3A5C">${cons.length}</div><div style="font-size:11px;color:#789">Actuaciones</div></div>
      <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#2E6DA4">${nuevos.length}</div><div style="font-size:11px;color:#789">Nuevos ingresos</div></div>
      <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#B71C1C">${bajas.length}</div><div style="font-size:11px;color:#789">Bajas</div></div>
      <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#4A148C">${cons.filter(c=>c.necropsia).length}</div><div style="font-size:11px;color:#789">Necropsias</div></div>
      <div style="text-align:center"><div style="font-size:28px;font-weight:700;color:#1B5E20">${new Set(cons.map(c=>c.animal_id)).size}</div><div style="font-size:11px;color:#789">Animales atendidos</div></div>
    </div>
    <div style="background:#F8FBFF;border-radius:8px;padding:10px;margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:#1A3A5C;margin-bottom:8px;text-transform:uppercase">Actuaciones por mes</div>
      <div style="display:flex;gap:4px;align-items:flex-end;height:80px">${mesBar}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div><div style="font-size:11px;font-weight:700;color:#1A3A5C;margin-bottom:6px;text-transform:uppercase">Por veterinario</div>${bar(byVet,'#1A3A5C')}</div>

    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

function guardarPassword(){
  const actual=document.getElementById('pwActual')?.value||'';
  const nueva=document.getElementById('pwNueva')?.value||'';
  const confirm=document.getElementById('pwConfirm')?.value||'';
  const err=document.getElementById('pwErr');
  if(actual!==currentUser.password){err.innerHTML='<div class="error-msg">La contraseña actual no es correcta</div>';return;}
  if(nueva.length<6){err.innerHTML='<div class="error-msg">La nueva contraseña debe tener al menos 6 caracteres</div>';return;}
  if(nueva!==confirm){err.innerHTML='<div class="error-msg">Las contraseñas no coinciden</div>';return;}
  // Update in USERS array
  const u=USERS.find(u=>u.id===currentUser.id);
  if(u){u.password=nueva;currentUser.password=nueva;}
  err.innerHTML='<div class="success-msg">✅ Contraseña cambiada correctamente</div>';
  setTimeout(closeModal,1500);
}

      <button id="btnConfirmDelete" disabled onclick="confirmarEliminar()" style="padding:9px 20px;border-radius:7px;border:none;background:#B71C1C;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;opacity:0.5" onmouseenter="if(!this.disabled)this.style.opacity='1'" onmouseleave="if(!this.disabled)this.style.opacity='1'">🗑️ Eliminar definitivamente</button>
    </div>
  </div></div>`;
  // Enable button styling when not disabled
  document.getElementById('confirmDelete').addEventListener('input', function(){
    const btn=document.getElementById('btnConfirmDelete');
    btn.style.opacity=this.value==='ELIMINAR'?'1':'0.5';
  });
}

async function confirmarEliminar(){
  if(!selAnimal)return;
  const id=selAnimal.id;
  const{error}=await db.from('animales').delete().eq('id',id);
  if(error){
    document.getElementById('deleteErr').innerHTML=`<div class="error-msg">Error: ${error.message}</div>`;
    return;
  }
  // Remove from local array
  allAnimals=allAnimals.filter(a=>a.id!==id);
  selAnimal=null;
  applyFilters();
  updateStatBar();
  closeModal();
  // Reset detail panel
  document.getElementById('detailPane').className='no-selection';
  document.getElementById('detailPane').innerHTML=`<div style="text-align:center;color:#999"><div style="font-size:56px;margin-bottom:10px">🦎</div><div style="font-size:14px;font-weight:500;color:#789">Selecciona un animal</div></div>`;
}


// ── EDITAR ACTUACIÓN ─────────────────────────────────────────────────────────
function puedeEditar(c){
  // Can edit if created_at is within last 24h
  if(!c.created_at) return false;
  const created = new Date(c.created_at);
  const now = new Date();
  const diffH = (now - created) / (1000 * 60 * 60);
  return diffH < 24;
}

function toggleEditPatologiaOtra(val){
  const inp=document.getElementById('ecPatologiaOtra');
  if(inp) inp.style.display=val==='__nueva__'?'block':'none';
}

async function guardarEdicionConsulta(id, idx){
  const g=fid=>document.getElementById(fid);
  if(!g('ecFecha')?.value){g('editConsultaErr').innerHTML='<div class="error-msg">La fecha es obligatoria</div>';return;}
  const patSel=g('ecPatologia')?.value||'';
  const patOtra=g('ecPatologiaOtra')?.value?.trim()||'';
  const patologia=patSel==='__nueva__'?patOtra:patSel;

  const row={
    fecha:g('ecFecha').value,
    veterinario:g('ecVet').value||'',
    estado_clinico:g('ecEstado').value||'',
    proxima_revision:g('ecRevision').value||null,
    peso:g('ecPeso').value||'',
    temperatura:g('ecTemp').value||'',
    patologia,
    motivo_consulta:g('ecMotivo').value||'',
    anamnesis:g('ecAnamnesis').value||'',
    exploracion_fisica:g('ecExploracion').value||'',
    diagnostico:g('ecDiagnostico').value||'',
    tratamiento:g('ecTratamiento').value||'',
    evolucion:g('ecEvolucion').value||'',
    pruebas_laboratorio:g('ecLab').value||'',
    pruebas_radiologicas:g('ecRadio').value||'',
    observaciones_consulta:g('ecObsConsulta').value||'',
    necropsia:g('ecNecropsia').checked,
    descripcion_necropsia:g('ecNecroDescTxt').value||'',
  };

  const{data,error}=await db.from('consultas').update(row).eq('id',id).select();
  if(error){g('editConsultaErr').innerHTML=`<div class="error-msg">Error: ${error.message}</div>`;return;}
  if(data&&data[0]){
    consultas[idx]=data[0];
    expandedConsultas=new Set([idx]);
  }
  closeModal();
  renderConsultasList();
}


// ── DAR DE ALTA ──────────────────────────────────────────────────────────────
function darDeAlta(){
  if(!selAnimal||selAnimal.estado!=='Baja') return;
  const nombre = selAnimal.nombre_alias
    ? selAnimal.nombre_comun+' "'+selAnimal.nombre_alias+'"'
    : selAnimal.nombre_comun||selAnimal.nombre_cientifico;

  const html='<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="max-width:420px">'
    +'<div class="modal-header" style="background:#1B5E20">'
    +'<span class="modal-title">🟢 Dar de alta — '+nombre+'</span>'
    +'<button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-body"><div id="altaErr"></div>'
    +'<p style="font-size:13px;color:#456;margin-bottom:16px">El animal volverá a figurar como <strong>Activo</strong> y se borrarán la fecha y motivo de baja.</p>'
    +'<div class="form-field"><label class="flabel">Motivo de la reactivación (opcional)</label>'
    +'<textarea class="ftextarea" id="altaMotivo" rows="2" placeholder="Ej: Recuperado, nueva cesión, error administrativo…"></textarea></div>'
    +'</div><div class="modal-footer">'
    +'<button class="btn-secondary" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn-primary" style="background:#1B5E20" onclick="confirmarAlta()">🟢 Confirmar alta</button>'
    +'</div></div></div>';
  document.getElementById('modalContainer').innerHTML=html;
}

async function confirmarAlta(){
  if(!selAnimal) return;
  const motivo=document.getElementById('altaMotivo')?.value?.trim()||'';
  const obs=motivo
    ?(selAnimal.observaciones?selAnimal.observaciones+'

Reactivación: '+motivo:'Reactivación: '+motivo)
    :selAnimal.observaciones||'';

  const{data,error}=await db.from('animales')
    .update({estado:'Activo',fecha_baja:null,motivo_baja:null,observaciones:obs})
    .eq('id',selAnimal.id).select();

  if(error){
    document.getElementById('altaErr').innerHTML='<div class="error-msg">Error: '+error.message+'</div>';
    return;
  }
  const saved=data[0];
  allAnimals=allAnimals.map(a=>a.id===selAnimal.id?saved:a);
  selAnimal=saved;
  applyFilters();
  updateStatBar();
  closeModal();
  renderDetail();
}
